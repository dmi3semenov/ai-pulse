# aliases.yml — словарь канонических имён сущностей.
#
# Ключ   = каноническое имя (именно оно попадёт в дашборд).
# Список = варианты, которые будут схлопнуты в этот ключ.
#
# Матчинг регистронезависимый. Само каноническое имя можно не дублировать в
# списке — оно и так считается вариантом самого себя. Wiki-страницы с разными
# title'ами, сводящимися к одному каноническому, будут объединены (их
# source_ids склеятся без дубликатов).
#
# Что здесь держать, а что — нет.
# Community-brain теперь сам канонизирует сущности на уровне KB
# (см. там canonicalize.py). Варианты, уже слитые у источника, здесь
# держать нет смысла — их всё равно не будет среди title'ов wiki-страниц.
# Оставляем только то, чего community-brain не делает:
#   - переименование community-brain-canonical в желаемое display-имя
#     (пример: «Андрей Карпаты» в KB → «Andrej Karpathy» в дашборде);
#   - склейки сущностей, которые community-brain считает разными, но для
#     дашборда это одна (пример: «Нейропакет 2025» → «Нейропакет»).

"Andrej Karpathy":
  - "Андрей Карпаты"
  - "Андрей Карпатый"

"Валерий Ковальский":
  - "neuraldeep"
  - "Валера Ковальский"
  - "VaKovaLskii"

"Нейропакет":
  - "Нейропакет 2025"

# Юникод-дубль: кириллическая «С» в начале слова (U+0421) вместо латинской
# «C» (U+0043). Глазом не отличить, но community-brain считает разными.
"CodeDash":
  - "СodeDash"
