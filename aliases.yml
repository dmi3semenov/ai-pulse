# aliases.yml — словарь канонических имён сущностей.
#
# Ключ   = каноническое имя (именно оно попадёт в дашборд).
# Список = варианты, которые будут схлопнуты в этот ключ.
#
# Матчинг регистронезависимый. Само каноническое имя можно не дублировать в
# списке — оно и так считается вариантом самого себя. Wiki-страницы с разными
# title'ами, сводящимися к одному каноническому, будут объединены (их
# source_ids склеятся без дубликатов).
#
# Дополняй по мере появления новых вариаций. Сохрани валидный YAML.

"Andrej Karpathy":
  - "Карпатый"
  - "Карпаты"
  - "Карпати"
  - "Андрей Карпатый"
  - "Андрей Карпаты"
  - "Андрей Карпати"
  - "Andrej Karpathy"
  - "Karpathy"
  - "karpathy"

"Валерий Ковальский":
  - "neuraldeep"
  - "Neural Deep"
  - "Валера Ковальский"
  - "VaKovaLskii"
  - "Ковальский"

"Нейропакет":
  - "NEJROPAKET"
  - "NEJROPAKET 2025"
  - "Нейропакет 2025"
  - "нейропакет"
