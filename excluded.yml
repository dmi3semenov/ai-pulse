# excluded.yml — сущности, которые НЕ попадают в дашборд.
#
# Сюда перечисляем администраторов и постоянных участников парсимых чатов:
# в рейтинге «людей» они всегда будут сверху просто потому, что их много
# упоминают в своих же сообществах, и это зашумляет сигнал.
#
# Формат: один ключ на категорию, значение — список имён.
# Имена должны быть в КАНОНИЧЕСКОЙ форме (той, которая останется после
# применения aliases.yml). Матчинг регистронезависимый.
#
# Пример: если в aliases.yml "neuraldeep" схлопывается в "Валерий Ковальский",
# то в excluded.yml нужно указать именно "Валерий Ковальский" — не "neuraldeep".

people:
  - "Валерий Ковальский"    # админ neuraldeep-чата (одного из парсимых)
  # Добавляй сюда других админов / завсегдатаев, когда заметишь их в дашборде.

# Если нужно скрыть что-то из других категорий — раскомментируй и заполни:
# concepts: []
# entities: []
# projects: []
